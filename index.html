<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Unblocked Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>AHS Unblocked Games</h1>
        <input type="text" id="searchBar" placeholder="Search games..." onkeyup="filterGames()">
    </header>

    <main>
        <div id="gameGrid" class="game-grid">
            <!-- Games will be injected here by JS -->
        </div>
    </main>

    <script src="script.js"></script>
<div id="games"></div>

<script>
fetch("games.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("games");

    data.forEach(game => {
      const el = document.createElement("a");
      el.href = game.url;
      el.innerText = game.name;
      el.style.display = "block";
      el.style.margin = "10px";

      container.appendChild(el);
    });
  });
</script>
</body>
</html>
