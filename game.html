<!DOCTYPE html>␊
<html lang="en">␊
<head>␊
    <meta charset="UTF-8">␊
    <title>Playing Game</title>␊
    <link rel="stylesheet" href="style.css">␊
</head>␊
<body>␊
    <button onclick="window.location.href='index.html'" style="margin-bottom: 10px; padding: 10px;">← Back to Home</button>␊
    <div id="container" class="game-container">␊
        <!-- Iframe will be injected here -->␊
    </div>␊
␊
    <script>␊
        // Get the game ID from the URL (e.g., game.html?id=1)␊
        const params = new URLSearchParams(window.location.search);␊
        const gameId = params.get('id');␊
␊
        fetch('games.json')␊
            .then(res => res.json())␊
            .then(games => {␊
                const game = games.find(g => String(g.id) === gameId);
                if (game) {␊
                    document.title = "Playing: " + game.title;␊
                    document.getElementById('container').innerHTML = `␊
                        <iframe src="${game.url || game.file}" allowfullscreen></iframe>
                    `;␊
                } else {␊
                    document.body.innerHTML = "<h1>Game not found</h1>";␊
                }␊
            });␊
    </script>␊
</body>␊
</html>
